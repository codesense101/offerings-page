<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offering</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* Offerings */
.offerings {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  z-index: 2;
}

.flower-btn {
  background: rgba(255,255,255,0.15);
  color: white;
  padding: 8px 12px;
  border-radius: 18px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  backdrop-filter: blur(6px);
}

/* Flower animation */
.flower {
  position: absolute;
  font-size: 18px;
  animation: fall 2.5s ease-out forwards;
  z-index: 3;
}

@keyframes fall {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(80vh); opacity: 0.9; }
}

/* CTA */
.cta {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  opacity: 0;
  transition: 1s;
  z-index: 2;
}

.cta button {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  border: 1px solid white;
  cursor: pointer;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <!-- Image -->
  <!-- <img 
    src="https://static.sadhguru.org/d/46272/1633188093-1633188092044.jpg"
    class="bg"
  /> -->
  <img src="sg2.jpg" class="bg"/>

  <div class="overlay"></div>

  <!-- Dynamic offerings -->
  <div class="offerings" id="offerings"></div>

  <!-- CTA -->
  <div class="cta" id="cta">
    <button onclick="goToLink()">Continue Your Offering →</button>
  </div>

</div>

<script src="data.js"></script>

<script>
let selectedLink = "";

// Generate buttons dynamically
const container = document.getElementById("offerings");

offeringsData.forEach(item => {
  const btn = document.createElement("div");
  btn.className = "flower-btn";
  btn.innerText = "🌼 " + item.name;

  btn.onclick = () => offer(item.link);

  container.appendChild(btn);
});

function offer(link) {
  selectedLink = link;

  // More flowers (increased)
  for (let i = 0; i < 60; i++) {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "🌸";

    f.style.left = Math.random() * window.innerWidth + "px";
    f.style.top = "-20px";

    document.body.appendChild(f);

    setTimeout(() => f.remove(), 2500);
  }

  // Show CTA
  setTimeout(() => {
    document.getElementById("cta").classList.add("show");
  }, 2000);
}

function goToLink() {
  if (selectedLink) {
    window.location.href = selectedLink;
  }
}
</script>

</body>
</html>
