<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offering</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* Offerings */
.offerings {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  z-index: 2;
  transition: opacity 0.6s ease;
}

.flower-btn {
  background: rgba(255,255,255,0.12);
  color: white;
  padding: 10px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* 🌸 Realistic Flower */
.flower {
  position: absolute;
  width: 28px;
  height: 28px;
  z-index: 3;
  pointer-events: none;
  opacity: 0.95;
}

/* Glow at feet */
.glow {
  position: absolute;
  width: 140px;
  height: 70px;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,215,120,0.7) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 2;
}

/* CTA */
.cta {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  opacity: 0;
  transition: 1s;
  z-index: 2;
}

.cta button {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  border: 1px solid white;
  cursor: pointer;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <img src="sg2.jpg" class="bg"/>
  <div class="overlay"></div>

  <div class="glow" id="glow"></div>

  <div class="offerings" id="offerings"></div>

  <div class="cta" id="cta">
    <button onclick="goToLink()">Continue Your Offering →</button>
  </div>

</div>

<script src="data.js"></script>

<script>
let selectedLink = "";
const container = document.getElementById("offerings");

// Create buttons
offeringsData.forEach(item => {
  const btn = document.createElement("div");
  btn.className = "flower-btn";
  btn.innerText = item.name;
  btn.onclick = () => offer(item.link);
  container.appendChild(btn);
});

// 🌸 Create realistic flower
function createFlower(startX) {
  const flower = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  flower.setAttribute("viewBox", "0 0 24 24");
  flower.classList.add("flower");

  // multi-petal flower
  flower.innerHTML = `
    <g>
      <ellipse cx="12" cy="6" rx="3" ry="6" fill="#ff9eb5"/>
      <ellipse cx="18" cy="12" rx="3" ry="6" transform="rotate(90 18 12)" fill="#ffb3c7"/>
      <ellipse cx="6" cy="12" rx="3" ry="6" transform="rotate(90 6 12)" fill="#ffc2d1"/>
      <ellipse cx="12" cy="18" rx="3" ry="6" fill="#ff8fab"/>
      <circle cx="12" cy="12" r="2" fill="#ffd166"/>
    </g>
  `;

  flower.style.left = startX + "px";
  flower.style.top = "-40px";

  document.body.appendChild(flower);

  // 🎯 target (feet)
  const targetX = window.innerWidth / 2 + (Math.random() * 120 - 60);
  const targetY = window.innerHeight * 0.85;

  const duration = 2200 + Math.random() * 800;
  const startTime = performance.now();

  function animate(time) {
    const t = (time - startTime) / duration;

    if (t >= 1) {
      flower.remove();
      flashGlow();
      return;
    }

    // gravity feel
    const ease = t * t;

    const x = startX + (targetX - startX) * t + Math.sin(t * 6) * 25;
    const y = ease * targetY;

    flower.style.transform = `
      translate(${x - startX}px, ${y}px)
      rotate(${t * 360}deg)
    `;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

// glow effect
function flashGlow() {
  const glow = document.getElementById("glow");
  glow.style.opacity = 1;
  setTimeout(() => glow.style.opacity = 0, 500);
}

function offer(link) {
  selectedLink = link;

  // fade names
  container.style.opacity = "0";
  container.style.pointerEvents = "none";

  // 🌧 continuous natural shower from TOP
  let count = 0;
  const interval = setInterval(() => {
    createFlower(Math.random() * window.innerWidth);
    count++;
    if (count > 70) clearInterval(interval);
  }, 60);

  setTimeout(() => {
    document.getElementById("cta").classList.add("show");
  }, 2600);
}

// function goToLink() {
//   if (selectedLink) {
//     window.location.href = selectedLink;
//   }
// }
function goToLink() {
  if (selectedLink) {
    window.open(selectedLink, "_blank");
  }
}
</script>

</body>
</html>
