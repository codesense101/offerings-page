<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offering</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* Offerings */
.offerings {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  z-index: 2;
  transition: opacity 0.6s ease;
}

.flower-btn {
  background: rgba(255,255,255,0.12);
  color: white;
  padding: 10px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* Flower */
.flower {
  position: absolute;
  width: 16px;
  height: 16px;
  z-index: 3;
  pointer-events: none;
}

/* Glow at feet */
.glow {
  position: absolute;
  width: 120px;
  height: 60px;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,215,120,0.6) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.6s ease;
  z-index: 2;
}

/* CTA */
.cta {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  opacity: 0;
  transition: 1s;
  z-index: 2;
}

.cta button {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  border: 1px solid white;
  cursor: pointer;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <img src="sg2.jpg" class="bg"/>
  <div class="overlay"></div>

  <!-- glow -->
  <div class="glow" id="glow"></div>

  <!-- names -->
  <div class="offerings" id="offerings"></div>

  <!-- CTA -->
  <div class="cta" id="cta">
    <button onclick="goToLink()">Continue Your Offering →</button>
  </div>

</div>

<script src="data.js"></script>

<script>
let selectedLink = "";
const container = document.getElementById("offerings");

// Create buttons
offeringsData.forEach(item => {
  const btn = document.createElement("div");
  btn.className = "flower-btn";
  btn.innerText = item.name;

  btn.onclick = () => offer(item.link);

  container.appendChild(btn);
});

// Create flower
function createFlower(startX) {
  const flower = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  flower.setAttribute("viewBox", "0 0 24 24");
  flower.classList.add("flower");

  flower.innerHTML = `
    <path d="M12 2 C14 6, 18 6, 20 10 C18 14, 14 14, 12 18 C10 14, 6 14, 4 10 C6 6, 10 6, 12 2 Z"
    fill="rgba(255,182,193,0.9)" />
  `;

  // start position (bottom)
  flower.style.left = startX + "px";
  flower.style.top = (window.innerHeight - 80) + "px";

  document.body.appendChild(flower);

  // target = feet zone
  const targetX = window.innerWidth / 2 + (Math.random() * 80 - 40);
  const targetY = window.innerHeight * 0.82;

  // animate curve
  const duration = 1800 + Math.random() * 400;
  const startTime = performance.now();

  function animate(time) {
    const t = (time - startTime) / duration;
    if (t >= 1) {
      flower.remove();
      flashGlow();
      return;
    }

    // quadratic curve
    const x = startX + (targetX - startX) * t;
    const y = (window.innerHeight - 80) - (t * t * 300);

    flower.style.transform = `translate(${x - startX}px, ${y - (window.innerHeight - 80)}px) rotate(${t * 180}deg)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

// glow effect
function flashGlow() {
  const glow = document.getElementById("glow");
  glow.style.opacity = 1;
  setTimeout(() => glow.style.opacity = 0, 400);
}

function offer(link) {
  selectedLink = link;

  // fade out names
  container.style.opacity = "0";
  container.style.pointerEvents = "none";

  // continuous offering flow
  let count = 0;
  const interval = setInterval(() => {
    createFlower(Math.random() * window.innerWidth);
    count++;
    if (count > 60) clearInterval(interval);
  }, 40);

  // CTA
  setTimeout(() => {
    document.getElementById("cta").classList.add("show");
  }, 2200);
}

function goToLink() {
  if (selectedLink) {
    window.location.href = selectedLink;
  }
}
</script>

</body>
</html>
