<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offering</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* Offerings */
.offerings {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  z-index: 2;
  transition: opacity 0.6s ease;
}

.flower-btn {
  background: rgba(255,255,255,0.12);
  color: white;
  padding: 10px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: transform 0.2s ease, background 0.2s;
}

.flower-btn:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.2);
}

/* SVG Flower */
.flower {
  position: absolute;
  width: 16px;
  height: 16px;
  opacity: 0.9;
  z-index: 3;
  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(-20px) translateX(0px) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(85vh) translateX(40px) rotate(180deg);
    opacity: 0.8;
  }
}

/* CTA */
.cta {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  opacity: 0;
  transition: 1s;
  z-index: 2;
}

.cta button {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  border: 1px solid white;
  cursor: pointer;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <img src="sg2.jpg" class="bg"/>
  <div class="overlay"></div>

  <div class="offerings" id="offerings"></div>

  <div class="cta" id="cta">
    <button onclick="goToLink()">Continue Your Offering →</button>
  </div>

</div>

<script src="data.js"></script>

<script>
let selectedLink = "";

const container = document.getElementById("offerings");

// Create buttons
offeringsData.forEach(item => {
  const btn = document.createElement("div");
  btn.className = "flower-btn";
  btn.innerText = item.name;

  btn.onclick = () => offer(item.link);

  container.appendChild(btn);
});

// Create SVG flower
function createFlower(xStart) {
  const flower = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  flower.setAttribute("viewBox", "0 0 24 24");
  flower.classList.add("flower");

  flower.innerHTML = `
    <path d="M12 2 C14 6, 18 6, 20 10 C18 14, 14 14, 12 18 C10 14, 6 14, 4 10 C6 6, 10 6, 12 2 Z"
    fill="rgba(255,182,193,0.9)" />
  `;

  flower.style.left = xStart + "px";
  flower.style.animationDuration = (2 + Math.random()) + "s";

  document.body.appendChild(flower);

  setTimeout(() => flower.remove(), 3000);
}

function offer(link) {
  selectedLink = link;

  // 🌑 Fade out names
  container.style.opacity = "0";
  container.style.pointerEvents = "none";

  // 🌸 Continuous flower shower
  let count = 0;
  const interval = setInterval(() => {
    createFlower(Math.random() * window.innerWidth);
    count++;

    if (count > 100) clearInterval(interval);
  }, 20); // density control

  // CTA
  setTimeout(() => {
    document.getElementById("cta").classList.add("show");
  }, 2200);
}

function goToLink() {
  if (selectedLink) {
    window.location.href = selectedLink;
  }
}
</script>

</body>
</html>
